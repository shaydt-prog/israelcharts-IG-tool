name: Daily Instagram Carousel

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate today's carousel
        run: python generate_carousel.py

      - name: Commit slides to repo
        run: |
          git config user.name "ig-bot"
          git config user.email "bot@israelicharts.com"
          git add output/
          git commit -m "Daily carousel $(date +%F)" || echo "no changes"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "push failed, retrying ($i)..."
            sleep 5
          done

      - name: Post carousel to Instagram
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/output
        run: python post_carousel.py
